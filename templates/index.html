<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Buddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --sidebar-bg: #151C2C;
  --sidebar-border: #1F2A3F;
  --sidebar-hover: #1C2438;
  --sidebar-active: #243050;
  --sidebar-text: #DDD8CF;
  --sidebar-muted: #5E6880;

  --bg: #F7F3EC;
  --surface: #FDFBF8;
  --border: #E6DFD3;
  --text: #1C1916;
  --muted: #7A7268;

  --accent: #C97A28;
  --accent-deep: #A86320;
  --accent-light: #FBF1E4;
  --accent-glow: rgba(201,122,40,0.15);

  --success: #287A55;
  --success-light: #EBF5EF;
  --success-border: #8ECBAC;
  --danger: #B84030;
  --danger-light: #FAE9E6;
  --danger-border: #DDA090;

  --radius: 11px;
  --shadow-xs: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14.5px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app { display: grid; grid-template-columns: 268px 1fr; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  background: var(--sidebar-bg);
  border-left: 1px solid var(--sidebar-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 22px 16px 14px;
  border-bottom: 1px solid var(--sidebar-border);
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 3px;
}

.logo-mark {
  width: 34px; height: 34px;
  background: linear-gradient(145deg, #D4872E, #B86A1A);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 2px 10px rgba(201,122,40,0.45);
  flex-shrink: 0;
}

.logo-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--sidebar-text);
  letter-spacing: -0.2px;
}

.logo-sub {
  font-size: 11px;
  color: var(--sidebar-muted);
  margin-right: 44px;
  letter-spacing: 0.4px;
}

.btn-new {
  width: 100%;
  margin-top: 14px;
  padding: 9px 16px;
  background: linear-gradient(135deg, #C97A28, #B06518);
  color: #FDF5EB;
  border: none;
  border-radius: 8px;
  font-size: 13.5px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.1px;
  box-shadow: 0 2px 8px rgba(201,122,40,0.4);
  transition: all 0.18s;
}
.btn-new:hover {
  background: linear-gradient(135deg, #B86818, #9A5610);
  box-shadow: 0 4px 14px rgba(201,122,40,0.5);
  transform: translateY(-1px);
}
.btn-new:active { transform: translateY(0); }

.lessons-list { flex: 1; overflow-y: auto; padding: 8px; }
.lessons-list::-webkit-scrollbar { width: 3px; }
.lessons-list::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 2px; }

.lesson-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  margin-bottom: 2px;
  transition: all 0.15s;
}
.lesson-item:hover { background: var(--sidebar-hover); }
.lesson-item.active { background: var(--sidebar-active); border-color: rgba(201,122,40,0.25); }

.l-title { font-size: 12.5px; font-weight: 500; color: var(--sidebar-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.l-meta { font-size: 10.5px; color: var(--sidebar-muted); margin-top: 2px; }
.l-course {
  display: inline-block;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 4px;
  padding: 1px 7px;
  font-size: 10px;
  color: var(--sidebar-muted);
  margin-top: 5px;
}

.empty-sidebar { text-align: center; padding: 2.5rem 1rem; color: var(--sidebar-muted); font-size: 13px; line-height: 1.7; }

/* ── Main ── */
.main { display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  padding: 0 26px;
  height: 58px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  box-shadow: var(--shadow-xs);
}
.topbar-info { flex: 1; min-width: 0; }
#lesson-title-display { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#lesson-meta-display { font-size: 11.5px; color: var(--muted); margin-top: 1px; }

.btn-delete {
  padding: 6px 13px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 12px;
  cursor: pointer;
  color: var(--muted);
  font-family: inherit;
  flex-shrink: 0;
  transition: all 0.15s;
}
.btn-delete:hover { border-color: var(--danger-border); color: var(--danger); background: var(--danger-light); }

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  padding: 0 26px;
}
.tab-btn {
  padding: 12px 20px;
  font-size: 13px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  font-weight: 500;
  font-family: inherit;
  transition: all 0.15s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text); }

.content { flex: 1; overflow-y: auto; padding: 28px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Welcome ── */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; text-align: center;
}
.welcome-icon { font-size: 54px; margin-bottom: 20px; }
.welcome h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px; font-weight: 500;
  color: var(--text); margin-bottom: 10px; letter-spacing: -0.3px;
}
.welcome p { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.65; }

/* ── Form ── */
.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 30px;
  max-width: 740px;
  box-shadow: var(--shadow-sm);
}
.form-card h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 19px; font-weight: 500;
  margin-bottom: 22px; letter-spacing: -0.3px;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 11px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.6px; text-transform: uppercase;
}

input[type=text], select, textarea {
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  width: 100%;
  font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: white;
  box-shadow: 0 0 0 3px var(--accent-glow);
}
textarea { min-height: 160px; resize: vertical; line-height: 1.7; }

/* Upload */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 26px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 8px;
  background: var(--bg);
}
.upload-zone:hover, .upload-zone.drag {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-zone input[type=file] { display: none; }
.upload-icon { font-size: 28px; margin-bottom: 10px; }
.upload-zone p { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.upload-zone strong { color: var(--accent); font-weight: 500; }

.file-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--success-light);
  border: 1px solid var(--success-border);
  color: #165535;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
}

.or-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 14px 0; color: var(--muted); font-size: 12px; letter-spacing: 0.3px;
}
.or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.form-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 18px 0; }
.actions { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }

.char-hint { font-size: 11px; color: var(--muted); text-align: left; margin-top: 3px; }

/* ── Buttons ── */
.btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13.5px;
  cursor: pointer;
  font-weight: 500;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg); }
.btn.primary {
  background: linear-gradient(135deg, #C97A28, #B06518);
  color: #FDF5EB;
  border-color: transparent;
  box-shadow: 0 2px 8px rgba(201,122,40,0.3);
}
.btn.primary:hover {
  background: linear-gradient(135deg, #B86818, #9A5610);
  box-shadow: 0 4px 14px rgba(201,122,40,0.42);
  transform: translateY(-1px);
}
.btn.primary:active { transform: translateY(0); }
.btn.secondary { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn.secondary:hover { background: #F3E4CC; }
.btn:disabled { opacity: 0.42; cursor: not-allowed !important; transform: none !important; }

/* ── Summary ── */
.summary-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px 34px;
  max-width: 740px;
  box-shadow: var(--shadow-sm);
  font-size: 14.5px;
  line-height: 1.85;
}

.summary-body h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 21px; font-weight: 600;
  color: var(--text);
  margin: 0 0 18px;
  letter-spacing: -0.4px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.summary-body h2 {
  font-size: 15.5px; font-weight: 600;
  color: var(--text);
  margin: 26px 0 10px;
  padding-right: 11px;
  border-right: 3px solid var(--accent);
}
.summary-body h3 {
  font-size: 14px; font-weight: 600;
  color: var(--accent-deep);
  margin: 18px 0 8px;
}
.summary-body p { margin: 0 0 10px; color: var(--text); }
.summary-body ul { margin: 8px 0 14px; padding-right: 22px; }
.summary-body ul li { margin-bottom: 5px; }
.summary-body strong { font-weight: 600; }
.summary-body em { font-style: italic; color: var(--muted); }

.section-actions { display: flex; gap: 10px; margin-bottom: 18px; max-width: 740px; }

/* ── Quiz ── */
.quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; max-width: 740px; }
.quiz-controls { display: flex; align-items: center; gap: 10px; }

.score-pill {
  background: var(--accent-light);
  border: 1px solid #EAC182;
  color: var(--accent-deep);
  font-size: 13px; font-weight: 600;
  padding: 6px 16px;
  border-radius: 20px;
}

.quiz-gen-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  max-width: 740px;
  margin-bottom: 22px;
  display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap;
  box-shadow: var(--shadow-xs);
}
.quiz-gen-form .field { flex: 1; min-width: 110px; }

.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 12px;
  max-width: 740px;
  box-shadow: var(--shadow-xs);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.q-card:hover { box-shadow: var(--shadow-sm); }

.q-num { font-size: 10.5px; font-weight: 700; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.6px; text-transform: uppercase; }
.q-text { font-size: 15px; font-weight: 500; margin-bottom: 16px; line-height: 1.5; }

.options { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  text-align: right;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  font-size: 13.5px;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  font-family: inherit;
  color: var(--text);
  line-height: 1.45;
}
.opt-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: translateX(-3px);
}
.opt-btn.correct { background: var(--success-light); border-color: var(--success-border); color: #13472E; font-weight: 500; }
.opt-btn.wrong { background: var(--danger-light); border-color: var(--danger-border); color: #6B1E14; }
.opt-btn:disabled { cursor: default; transform: none !important; }

.explanation {
  font-size: 12.5px;
  color: var(--muted);
  background: var(--bg);
  border-radius: 7px;
  padding: 10px 13px;
  margin-top: 12px;
  line-height: 1.65;
  display: none;
  border-right: 3px solid #EAC182;
}

.no-quiz { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }

/* ── Chat ── */
.chat-wrap { display: flex; flex-direction: column; height: 100%; max-width: 740px; }
.chat-messages { flex: 1; overflow-y: auto; padding-bottom: 16px; }
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { margin-bottom: 16px; animation: msgIn 0.2s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.msg .bubble {
  display: inline-block; max-width: 85%;
  padding: 10px 14px; border-radius: 14px;
  font-size: 14px; line-height: 1.65; white-space: pre-wrap;
}
.msg.user { text-align: left; }
.msg.user .bubble {
  background: linear-gradient(135deg, #C97A28, #B06518);
  color: #FDF5EB;
  border-radius: 14px 14px 4px 14px;
  box-shadow: 0 2px 8px rgba(201,122,40,0.25);
}
.msg.bot .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px 14px 14px 4px;
  box-shadow: var(--shadow-xs);
}
.msg .time { font-size: 10px; color: var(--muted); margin-top: 4px; }

.chat-input-wrap { border-top: 1px solid var(--border); padding-top: 14px; display: flex; gap: 10px; flex-shrink: 0; }
.chat-input-wrap input { flex: 1; }
.chat-empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 13.5px; line-height: 1.7; }
.chat-empty span { font-size: 30px; display: block; margin-bottom: 12px; }

/* ── Loading / Toast ── */
.spinner-inline {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: rgba(255,255,255,0.9);
  border-radius: 50%;
  animation: spin 0.55s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-bar {
  height: 2px;
  background: linear-gradient(90deg, #C97A28, #E8A840, #C97A28);
  background-size: 200% 100%;
  position: fixed; top: 0; left: 0; right: 0;
  animation: barShimmer 1.4s ease infinite;
  display: none; z-index: 100;
}
@keyframes barShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.toast {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  background: #1C1916; color: #F7F3EC;
  padding: 11px 22px; border-radius: 10px;
  font-size: 13.5px; display: none; z-index: 200;
  box-shadow: var(--shadow-md);
  max-width: 360px; text-align: center; line-height: 1.5;
}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<div class="toast" id="toast"></div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-row">
        <div class="logo-mark">📚</div>
        <div class="logo-name">Study Buddy</div>
      </div>
      <div class="logo-sub">כלי לימוד חכם</div>
      <button class="btn-new" onclick="showNewLesson()">+ שיעור חדש</button>
    </div>
    <div class="lessons-list" id="lessons-list">
      <div class="empty-sidebar">לחצי על "+ שיעור חדש"<br>כדי להתחיל</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar" id="topbar" style="display:none">
      <div class="topbar-info">
        <div id="lesson-title-display"></div>
        <div id="lesson-meta-display"></div>
      </div>
      <button class="btn-delete" onclick="deleteLesson()">🗑 מחק</button>
    </div>

    <div class="tabs" id="tabs" style="display:none">
      <button class="tab-btn active" onclick="switchTab('summary')" id="t-summary">📄 סיכום</button>
      <button class="tab-btn" onclick="switchTab('quiz')" id="t-quiz">🎯 מבחן</button>
      <button class="tab-btn" onclick="switchTab('chat')" id="t-chat">💬 שאל שאלה</button>
    </div>

    <div class="content" id="content">
      <div class="welcome">
        <div class="welcome-icon">📖</div>
        <h2>ברוכה הבאה ל-Study Buddy</h2>
        <p>העלי קובץ או הדבקי טקסט — וקבלי סיכום ומבחן תוך שניות</p>
      </div>
    </div>
  </div>
</div>

<script>
let currentLesson = null;
let quizAnswered = {};
let uploadedText = null;
let uploadedFilenames = [];
let quizGenerating = false;

loadSidebar();

async function loadSidebar() {
  const res = await fetch('/api/lessons');
  const lessons = await res.json();
  const el = document.getElementById('lessons-list');
  if (!lessons.length) {
    el.innerHTML = '<div class="empty-sidebar">לחצי על "+ שיעור חדש"<br>כדי להתחיל</div>';
    return;
  }
  el.innerHTML = lessons.reverse().map(l => `
    <div class="lesson-item ${currentLesson?.id === l.id ? 'active' : ''}" onclick="openLesson('${l.id}')">
      <div class="l-title">${esc(l.title)}</div>
      <div class="l-meta">${l.date}</div>
      <div class="l-course">${esc(l.course)}</div>
    </div>`).join('');
}

function showNewLesson() {
  currentLesson = null;
  uploadedText = null;
  uploadedFilenames = [];
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('content').innerHTML = `
    <div class="form-card">
      <h2>שיעור חדש</h2>
      <div class="form-row">
        <div class="field"><label>שם השיעור</label><input type="text" id="f-title" placeholder="למשל: מדינה ופוליטיקה — שיעור 3"></div>
        <div class="field"><label>קורס</label><input type="text" id="f-course" placeholder="למשל: מדע המדינה"></div>
      </div>
      <div class="field" style="margin-bottom:8px"><label>קבצים (PDF · Word · TXT) — ניתן לבחור כמה קבצים</label></div>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event)">
        <input type="file" id="file-input" accept=".pdf,.docx,.txt" multiple onchange="handleFiles(this.files)">
        <div class="upload-icon">📂</div>
        <p><strong>לחצי כאן להעלאת קבצים</strong> או גרירה לכאן</p>
        <p style="margin-top:4px">PDF · Word · TXT · כמה קבצים בבת אחת</p>
      </div>
      <div id="file-badge-wrap"></div>
      <div class="or-divider">או הדביקי טקסט ישירות</div>
      <div class="field">
        <textarea id="f-text" placeholder="הדבקי כאן סיכומים, הערות, מצגות..." oninput="updateChar()"></textarea>
        <div class="char-hint" id="char-hint">0 תווים</div>
      </div>
      <div class="form-options">
        <div class="field"><label>סוג סיכום</label>
          <select id="f-stype">
            <option value="מפורט ומסודר">מפורט ומסודר</option>
            <option value="נקודות מפתח">נקודות מפתח</option>
            <option value="מינימליסטי">מינימליסטי</option>
          </select>
        </div>
        <div class="field"><label>מספר שאלות</label>
          <select id="f-qcount">
            <option value="5">5 שאלות</option>
            <option value="8">8 שאלות</option>
            <option value="10" selected>10 שאלות</option>
            <option value="15">15 שאלות</option>
          </select>
        </div>
        <div class="field"><label>רמת קושי</label>
          <select id="f-diff">
            <option value="קל">קל</option>
            <option value="בינוני" selected>בינוני</option>
            <option value="מאתגר">מאתגר</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="submitNew()" id="btn-submit">✨ צור סיכום ומבחן</button>
      </div>
    </div>`;
}

function updateChar() {
  const v = document.getElementById('f-text')?.value.length || 0;
  const el = document.getElementById('char-hint');
  if (el) el.textContent = v + ' תווים';
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
}

async function handleFiles(fileList) {
  if (!fileList || fileList.length === 0) return;
  const formData = new FormData();
  for (const file of fileList) formData.append('files', file);
  setLoading(true);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.error) { toast(data.error); return; }
    uploadedText = data.text;
    uploadedFilenames = data.filenames;
    const badges = data.filenames.map(name => `<span class="file-badge">✅ ${esc(name)}</span>`).join('');
    const warn = data.errors?.length
      ? `<div style="font-size:12px;color:var(--danger);margin-top:4px">${data.errors.map(esc).join('<br>')}</div>` : '';
    document.getElementById('file-badge-wrap').innerHTML = `
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:8px 0 4px">
        ${badges}
        <button style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;font-family:inherit" onclick="clearFile()">× נקה הכל</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${uploadedText.length.toLocaleString()} תווים סה"כ</div>
      ${warn}`;
    document.getElementById('f-text').value = '';
    document.getElementById('char-hint').textContent = '';
  } catch(e) {
    toast('שגיאה בקריאת הקבצים');
  } finally {
    setLoading(false);
  }
}

function clearFile() {
  uploadedText = null;
  uploadedFilenames = [];
  document.getElementById('file-badge-wrap').innerHTML = '';
  document.getElementById('file-input').value = '';
}

async function submitNew() {
  const title = document.getElementById('f-title').value.trim() || 'שיעור ללא שם';
  const course = document.getElementById('f-course').value.trim() || 'כללי';
  const manualText = document.getElementById('f-text').value.trim();
  const text = uploadedText || manualText;
  const stype = document.getElementById('f-stype').value;
  const qcount = document.getElementById('f-qcount').value;
  const diff = document.getElementById('f-diff').value;

  if (!text || text.length < 50) { toast('אנא העלי קובץ או הדביקי טקסט (לפחות 50 תווים)'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner-inline"></div> מכין סיכום...';
  setLoading(true);

  let lessonId = null;
  try {
    const res = await fetch('/api/generate/summary', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text, title, course, summary_type: stype, filenames: uploadedFilenames })
    });
    const data = await res.json();
    if (data.error) { toast(data.error); btn.disabled = false; btn.innerHTML = '✨ צור סיכום ומבחן'; return; }
    lessonId = data.lesson_id;
    await loadSidebar();
    await openLesson(lessonId);
  } catch(e) {
    toast('שגיאה — בדקי את ה-API key');
    btn.disabled = false;
    btn.innerHTML = '✨ צור סיכום ומבחן';
    return;
  } finally {
    setLoading(false);
  }

  quizGenerating = true;
  if (document.getElementById('t-quiz')?.classList.contains('active')) renderQuiz();

  try {
    const qres = await fetch('/api/generate/quiz', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ lesson_id: lessonId, q_count: qcount, difficulty: diff })
    });
    const quiz = await qres.json();
    quizGenerating = false;
    if (!quiz.error && currentLesson?.id === lessonId) {
      currentLesson.quiz = quiz;
      if (document.getElementById('t-quiz')?.classList.contains('active')) renderQuiz();
    }
  } catch(e) {
    quizGenerating = false;
  }
}

async function openLesson(id) {
  const res = await fetch(`/api/lessons/${id}`);
  currentLesson = await res.json();
  quizAnswered = {};
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('lesson-title-display').textContent = currentLesson.title;
  document.getElementById('lesson-meta-display').textContent = currentLesson.course + ' · ' + currentLesson.date;
  loadSidebar();
  switchTab('summary');
}

function switchTab(tab) {
  ['summary','quiz','chat'].forEach(t => {
    document.getElementById('t-'+t)?.classList.toggle('active', t===tab);
  });
  if (tab === 'summary') renderSummary();
  if (tab === 'quiz') renderQuiz();
  if (tab === 'chat') renderChat();
}

/* ── Markdown renderer ── */
function fmt(s) {
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
}

function renderMarkdown(text) {
  const lines = text.split('\n');
  let html = '', inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (!t) { if (inList) { html += '</ul>'; inList = false; } continue; }
    if      (t.startsWith('### ')) { if (inList) { html += '</ul>'; inList = false; } html += `<h3>${fmt(t.slice(4))}</h3>`; }
    else if (t.startsWith('## '))  { if (inList) { html += '</ul>'; inList = false; } html += `<h2>${fmt(t.slice(3))}</h2>`; }
    else if (t.startsWith('# '))   { if (inList) { html += '</ul>'; inList = false; } html += `<h1>${fmt(t.slice(2))}</h1>`; }
    else if (t.startsWith('- ') || t.startsWith('* ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${fmt(t.slice(2))}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p>${fmt(t)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function renderSummary() {
  document.getElementById('content').innerHTML =
    `<div class="summary-body">${renderMarkdown(currentLesson.summary)}</div>`;
}

function renderQuiz() {
  let html = `<div class="quiz-gen-form">
    <div class="field"><label>מספר שאלות</label>
      <select id="rq-count"><option value="5">5</option><option value="8">8</option><option value="10" selected>10</option><option value="15">15</option></select>
    </div>
    <div class="field"><label>רמת קושי</label>
      <select id="rq-diff"><option value="קל">קל</option><option value="בינוני" selected>בינוני</option><option value="מאתגר">מאתגר</option></select>
    </div>
    <button class="btn secondary" onclick="regenerateQuiz()" id="regen-btn">🔄 צור מבחן חדש</button>
  </div>`;

  if (!currentLesson.quiz) {
    html += quizGenerating
      ? `<div class="no-quiz" style="display:flex;flex-direction:column;align-items:center;gap:14px">
           <div class="spinner-inline" style="width:24px;height:24px;border-color:rgba(201,122,40,0.2);border-top-color:var(--accent)"></div>
           <span>מכין מבחן... עד דקה</span>
         </div>`
      : '<div class="no-quiz">אין מבחן עדיין — לחצי על "צור מבחן חדש"</div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  const qs = currentLesson.quiz.questions;
  const correct = Object.entries(quizAnswered).filter(([qi,oi]) => parseInt(oi) === qs[qi].correct).length;

  html += `<div class="quiz-header">
    <span style="font-size:15px;font-weight:600">${qs.length} שאלות</span>
    <div class="quiz-controls">
      <span class="score-pill">${correct} / ${qs.length} נכון</span>
      <button class="btn" onclick="resetQuiz()">🔁 נסי שוב</button>
    </div>
  </div>`;

  qs.forEach((q, i) => {
    html += `<div class="q-card">
      <div class="q-num">שאלה ${i+1}</div>
      <div class="q-text">${esc(q.q)}</div>
      <div class="options">`;
    q.options.forEach((opt, j) => {
      let cls = '';
      if (quizAnswered[i] !== undefined) {
        if (j === q.correct) cls = 'correct';
        else if (j === quizAnswered[i] && j !== q.correct) cls = 'wrong';
      }
      html += `<button class="opt-btn ${cls}" ${quizAnswered[i]!==undefined?'disabled':''} onclick="answerQ(${i},${j})">${esc(opt)}</button>`;
    });
    html += `</div>
      <div class="explanation" style="${quizAnswered[i]!==undefined?'display:block':''}">${esc(q.explanation)}</div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

async function regenerateQuiz() {
  const count = document.getElementById('rq-count').value;
  const diff = document.getElementById('rq-diff').value;
  const btn = document.getElementById('regen-btn');
  btn.disabled = true; btn.textContent = 'מכין...';
  setLoading(true);
  try {
    const res = await fetch('/api/generate/quiz', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ lesson_id: currentLesson.id, q_count: count, difficulty: diff })
    });
    const quiz = await res.json();
    currentLesson.quiz = quiz;
    quizAnswered = {};
    renderQuiz();
  } catch(e) { toast('שגיאה'); }
  finally { setLoading(false); }
}

function answerQ(qi, oi) { quizAnswered[qi] = oi; renderQuiz(); }
function resetQuiz() { quizAnswered = {}; renderQuiz(); }

function renderChat() {
  const history = currentLesson?.chat_history || [];
  const msgs = history.length
    ? history.map(h => `
        <div class="msg user"><div class="bubble">${esc(h.q)}</div><div class="time">${h.time}</div></div>
        <div class="msg bot"><div class="bubble">${esc(h.a)}</div></div>`).join('')
    : `<div class="chat-empty"><span>💬</span>שאלי כל שאלה על חומר השיעור<br>אענה רק על בסיס מה שהעלית</div>`;

  document.getElementById('content').innerHTML = `
    <div class="chat-wrap">
      <div class="chat-messages" id="chat-msgs">${msgs}</div>
      <div class="chat-input-wrap">
        <input type="text" id="chat-input" placeholder="למשל: מה ההבדל בין X ל-Y?" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn primary" onclick="sendChat()" id="chat-btn">שלח</button>
      </div>
    </div>`;
  const el = document.getElementById('chat-msgs');
  if (el) el.scrollTop = el.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const q = input?.value.trim();
  if (!q || !currentLesson) return;
  input.value = '';
  const btn = document.getElementById('chat-btn');
  btn.disabled = true; btn.textContent = '...';
  const msgs = document.getElementById('chat-msgs');
  msgs.innerHTML += `<div class="msg user"><div class="bubble">${esc(q)}</div></div>`;
  msgs.innerHTML += `<div class="msg bot" id="thinking"><div class="bubble" style="color:var(--muted)">חושב...</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ lesson_id: currentLesson.id, question: q })
    });
    const data = await res.json();
    document.getElementById('thinking').remove();
    msgs.innerHTML += `<div class="msg bot"><div class="bubble">${esc(data.answer)}</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    currentLesson.chat_history = currentLesson.chat_history || [];
    currentLesson.chat_history.push({ q, a: data.answer, time: new Date().toLocaleTimeString('he',{hour:'2-digit',minute:'2-digit'}) });
  } catch(e) {
    document.getElementById('thinking').remove();
    msgs.innerHTML += `<div class="msg bot"><div class="bubble" style="color:var(--muted)">שגיאה, נסי שוב</div></div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'שלח';
  }
}

async function deleteLesson() {
  if (!currentLesson || !confirm('למחוק את השיעור הזה?')) return;
  await fetch(`/api/lessons/${currentLesson.id}`, { method: 'DELETE' });
  currentLesson = null;
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('content').innerHTML = `
    <div class="welcome">
      <div class="welcome-icon">📖</div>
      <h2>שיעור נמחק</h2>
      <p>לחצי על "+ שיעור חדש" כדי להמשיך</p>
    </div>`;
  loadSidebar();
}

function setLoading(on) { document.getElementById('loading-bar').style.display = on ? 'block' : 'none'; }
function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 3500); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
